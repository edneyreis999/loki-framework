package:
  name: loki-framework-local
  version: "0.1.0"
  status: approved-for-manual-installation
  created: "2026-06-24"
  scope: local-project-package
  description: "Pacote documental local do Loki Framework dividido em agents, commands, skills, templates e docs, com roteamento explicito entre regras do pacote e documentacao duradoura do projeto consumidor."
  human_approval: "Aprovado pelo usuario em 2026-06-24 na task-2.1 e aprovado como pacote operacional final em 2026-06-24 na task-4.3."

source:
  package_root: "."
  source_boundaries: "docs/source-boundaries.md"
  operational_inventory: "docs/operational-inventory.md"
  usage_guide: "docs/usage-guide.md"
  plan_execution_workflow: "docs/loki-plan-execution-workflow.md"
  learning_workflow: "docs/loki-learning-workflow.md"
  authoring_guardrails: "docs/package-authoring-guardrails.md"
  consumer_context_contract: "docs/project-context-catalog.md"
  self_contained_policy: "This package must not require blueprint, plan, .agents, .claude, or game-project files outside this directory to operate."

install_policy:
  mode: manual-or-sync-after-approval
  project_scope_only: true
  automatic_installation: false
  claude_code_target:
    commands: ".claude/commands/loki/"
    agents: ".claude/agents/"
    skills: ".claude/skills/"
  codex_target:
    agents: ".agents/agents/"
    commands: ".agents/commands/"
    skills: ".agents/skills/"
  approval_required_before_copy:
    - ".claude/**"
    - ".agents/**"

guardrails:
  normative_sources:
    - "."
    - "manifest.yaml"
    - "docs/source-boundaries.md"
    - "docs/operational-inventory.md"
    - "docs/usage-guide.md"
    - "docs/loki-plan-execution-workflow.md"
    - "docs/loki-learning-workflow.md"
    - "docs/package-authoring-guardrails.md"
    - "docs/project-context-catalog.md"
  non_normative_sources:
    - ".agents/**"
  consumer_application_targets:
    - "docs/**/*.md"
    - "docs/index.xml"
    - "AGENTS.md"
    - "CLAUDE.md"
  consumer_runtime_surfaces:
    placeholder: "<consumer_runtime_surfaces>"
    description: "Superficies de runtime/engine/framework declaradas pelo projeto consumidor ou por skill tecnica especializada."
  sensitive_write_patterns:
    placeholder: "<sensitive_write_patterns>"
    description: "Padroes de escrita sensivel declarados pelo projeto consumidor, por contrato de plano ou por extensao tecnica opcional."
  technology_required_skills:
    placeholder: "<technology_required_skills>"
    description: "Skills tecnicas carregadas somente quando o contexto, o usuario ou o plano aprovado exigir uma tecnologia especifica."
  human_validation_gate:
    placeholder: "<human_validation_gate>"
    description: "Validacao humana apropriada ao dominio antes de declarar comportamento perceptivel, estado runtime ou integracoes como validadas."
  forbidden_writes_without_later_approval:
    - ".claude/**"
    - ".agents/**"
    - "<sensitive_write_patterns>"
    - "<consumer_runtime_surfaces>"
  runtime_gate: "Validacao humana obrigatoria para comportamento perceptivel, estado runtime, integracoes ativas ou superficies declaradas por skill tecnica."

